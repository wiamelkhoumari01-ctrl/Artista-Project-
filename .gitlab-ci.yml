stages:
  - build
  - sonarqube

# Étape 1 : Build avec la bonne version de Node
build_project:
  stage: build
  image: node:22  # <-- On passe de 18 à 22 pour satisfaire Vite
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - public/build/
    expire_in: 48 hours

# Étape 2 : Analyse SonarCloud (On ne change rien ici)
sonarqube-check:
  stage: sonarqube
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner
  only:
    - main